<!--
  KPZ Draw — Wix HTML Embed shim — v3.9.24
  ==========================================================================
  Paste this ENTIRE file ONCE into the HTML Embed component on indalkp.com/draw,
  replacing whatever's currently there. After this paste, you NEVER need to
  edit the Wix Editor again for a release.

  HOW IT WORKS
  -----------
  Same as your previous bootstrap (loading spinner, error UI, ag-psd preload,
  jsDelivr-served main.js) — just one change. The hardcoded `VERSION` constant
  is gone. Instead, the bootstrap asks the parent Wix page over postMessage:
     { type: 'kpz-request-version' }
  Velo Page Code (Draw.w52ay.js, KPZ_VERSION constant near the top) replies:
     { type: 'kpz-version', version: 'v3.9.24' }
  …and the bootstrap dynamically imports main.js from
     cdn.jsdelivr.net/gh/indalkp/kpz-draw@<version>/src/main.js

  Fallback: if Velo doesn't reply within 5 seconds (Velo broken / running
  outside the Wix iframe), the bootstrap loads from @main so the screen
  isn't blank. Loses tag-pin rollback in that mode but the app still boots.

  RELEASING A NEW VERSION (after this paste)
  ------------------------------------------
  1. kpz-draw repo: edit code, push, tag with `vX.Y.Z`.
  2. indalkp-wix repo: edit `KPZ_VERSION` in src/pages/Draw.w52ay.js,
     push, run `wix publish --source remote -y`.
  3. Live in ~10 seconds. The HTML Embed (this file) is never touched again.

  ROLLBACK
  --------
  Edit `KPZ_VERSION` in Draw.w52ay.js to any previous tag (e.g. 'v3.9.21'),
  push, `wix publish`. Live on the older tag in ~10 seconds.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>KPZ Draw</title>
  <!-- External dependency: ag-psd for PSD export -->
  <script src="https://unpkg.com/ag-psd@30.1.0/dist/bundle.js"></script>
  <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1a1a;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#e8e8e8}
    #kpz-root{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
    .kpz-loading{text-align:center;color:#ff7a45}
    .kpz-loading .spin{display:inline-block;width:32px;height:32px;border:3px solid #333;
      border-top-color:#ff7a45;border-radius:50%;animation:kpzspin 1s linear infinite;margin-bottom:12px}
    @keyframes kpzspin{to{transform:rotate(360deg)}}
    .kpz-error{color:#fff;padding:40px;max-width:500px;font-size:14px;line-height:1.5}
    .kpz-error h2{color:#e55353;margin:0 0 12px}
    .kpz-error code{background:#2e2e2e;padding:2px 6px;border-radius:3px;font-size:12px}
    .kpz-error .hint{color:#9a9a9a;font-size:12px;margin-top:12px}
  </style>
</head>
<body>
<div id="kpz-root">
  <div class="kpz-loading">
    <div class="spin"></div>
    <div>Loading KPZ Draw…</div>
  </div>
</div>
<script type="module">
  // ==========================================================================
  //  KPZ Draw — Wix Embed Bootstrap (v3.9.24 — dynamic version via Velo)
  //
  //  This file lives in the Wix Editor's HTML Embed element.
  //  All actual app code is served from GitHub via jsDelivr CDN.
  //
  //  v3.9.24: VERSION is now resolved at runtime from the parent Wix page's
  //  Velo Page Code (Draw.w52ay.js, KPZ_VERSION constant). To deploy a new
  //  release: push to GitHub + tag, then bump KPZ_VERSION in Draw.w52ay.js
  //  and run `wix publish --source remote -y`. No Wix Editor edits needed.
  // ==========================================================================
  const REPO              = 'indalkp/kpz-draw';
  const FALLBACK_VERSION  = 'main';  // used if Velo doesn't reply in time
  const VERSION_TIMEOUT   = 5000;    // ms

  /**
   * Ask the parent Wix page for the pinned version. Resolves with the
   * version string on success, or FALLBACK_VERSION on timeout / no parent.
   */
  function getVersionFromVelo() {
    return new Promise((resolve) => {
      // Standalone (not embedded) → no Velo, go straight to fallback.
      if (window.parent === window) {
        resolve(FALLBACK_VERSION);
        return;
      }
      let done = false;
      const finish = (v) => {
        if (done) return;
        done = true;
        window.removeEventListener('message', onMsg);
        resolve(v);
      };
      const onMsg = (e) => {
        const d = e.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === 'kpz-version' && typeof d.version === 'string' && d.version) {
          finish(d.version);
        }
      };
      window.addEventListener('message', onMsg);
      try {
        window.parent.postMessage({ type: 'kpz-request-version' }, '*');
      } catch (_) { /* postMessage rarely throws but be safe */ }
      setTimeout(() => {
        if (done) return;
        console.warn('[KPZ] No version response from Velo within ' +
                     VERSION_TIMEOUT + 'ms; falling back to @' + FALLBACK_VERSION);
        finish(FALLBACK_VERSION);
      }, VERSION_TIMEOUT);
    });
  }

  let VERSION = FALLBACK_VERSION;
  try {
    VERSION = await getVersionFromVelo();
    const BASE = `https://cdn.jsdelivr.net/gh/${REPO}@${VERSION}/src`;
    const mod = await import(`${BASE}/main.js`);
    if (typeof mod.init !== 'function') {
      throw new Error('main.js does not export an init() function');
    }
    await mod.init('#kpz-root', { baseUrl: BASE, version: VERSION });
  } catch (err) {
    console.error('KPZ Draw load failed:', err);
    document.getElementById('kpz-root').innerHTML = `
      <div class="kpz-error">
        <h2>Failed to load KPZ Draw</h2>
        <p><b>Version:</b> <code>${VERSION}</code></p>
        <p><b>Error:</b> <code>${(err && err.message) ? err.message : String(err)}</code></p>
        <p class="hint">
          If this is a fresh deploy, jsDelivr may still be caching the files.
          Wait ~2 minutes and reload. Otherwise, verify the tag
          <code>${VERSION}</code> exists in the GitHub repo <code>${REPO}</code>,
          and that the Velo page-code on /draw exposes a matching
          <code>KPZ_VERSION</code> constant.
        </p>
      </div>
    `;
  }
</script>
</body>
</html>
