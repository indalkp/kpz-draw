<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>KPZ Draw</title>
  <script src="https://unpkg.com/ag-psd@30.1.0/dist/bundle.js"></script>
  <style>
    html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#1a1a1a;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#e8e8e8;
      /* v3.12.0: belt-and-braces touch-action so the WIX HTML Embed iframe's
         outer document also tells iOS Safari "no gestures here". The
         canvas-level rules in styles.css cover the inner surface; this
         covers the page chrome around it. */
      touch-action:none;-webkit-user-select:none;user-select:none;
      -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
      overscroll-behavior:none}
    #kpz-root{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;touch-action:none}
    .kpz-loading{text-align:center;color:#ff7a45}
    .kpz-loading .spin{display:inline-block;width:32px;height:32px;border:3px solid #333;
      border-top-color:#ff7a45;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <!--
    v3.25.0 — v3 design preview gate.
    ===============================================================
    Reads `?v3=1` from this iframe's URL OR from the parent page's
    URL (top.location.search; same-origin under indalkp.com).
    When set, flips body[data-v3="1"] and injects v3-theme.css from
    the same jsDelivr base used for main.js. With no ?v3=1 the
    default chrome from styles.css renders untouched (v3.18.1
    surface preserved bit-for-bit).

    Why inline + early:
      - Runs before the main module import so the data-attribute is
        present when styles.css and v3-theme.css cascade.
      - top.location.search read is wrapped in try/catch so that any
        future cross-origin embed (e.g., previewing on a non-Wix
        host) silently falls back to the iframe's own URL.

    Future v3 increments compose under the same body[data-v3="1"]
    selector. Do not duplicate this gate elsewhere.
  -->
  <script>
    (function(){
      try {
        var qs = (location.search || '');
        try { if (window.top && window.top !== window.self) {
          // Same-origin parent (indalkp.com/draw) — sniff its query.
          qs += '&' + (window.top.location.search || '').slice(1);
        }} catch(_){ /* cross-origin parent — keep iframe-only qs */ }
        var v3on = /[?&]v3=1\b/.test(qs);
        if (v3on) {
          document.documentElement.setAttribute('data-v3','1');
          document.body && document.body.setAttribute('data-v3','1');
          document.addEventListener('DOMContentLoaded', function(){
            document.body.setAttribute('data-v3','1');
          });
        }
      } catch(_){ /* never block the boot on theme detection */ }
    })();
  </script>
</head>
<body>
  <div id="kpz-root">
    <div class="kpz-loading"><div class="spin"></div><div>Loading KPZ Draw…</div></div>
  </div>

  <script type="module">
    // Version pin — change only when deploying a new release
    const VERSION = 'v3.25.0';
    const REPO    = 'indalkp/kpz-draw';
    const BASE    = `https://cdn.jsdelivr.net/gh/${REPO}@${VERSION}/src`;

    // v3.25.0: when ?v3=1 was detected by the inline gate above, also
    // inject the v3 sketchy paper theme stylesheet from the same base.
    // Loaded AFTER styles.css so its cascaded rules override the
    // baseline tokens (--bg, --panel, etc.) for v3-flagged sessions.
    if (document.body.getAttribute('data-v3') === '1') {
      const link = document.createElement('link');
      link.rel  = 'stylesheet';
      link.href = `${BASE}/v3-theme.css`;
      document.head.appendChild(link);
    }

    try {
      const mod = await import(`${BASE}/main.js`);
      await mod.init('#kpz-root', { baseUrl: BASE, version: VERSION });
    } catch (err) {
      document.getElementById('kpz-root').innerHTML =
        '<div style="color:#fff;padding:40px;max-width:500px">' +
          '<h2 style="color:#e55353">Failed to load KPZ Draw</h2>' +
          '<p>Version: <code>' + VERSION + '</code></p>' +
          '<p>Error: <code>' + (err?.message || String(err)) + '</code></p>' +
          '<p style="color:#9a9a9a;font-size:13px">' +
            'Check that the version tag exists in the GitHub repo, ' +
            'and that jsDelivr has cached it (usually takes &lt;2 min after a push).' +
          '</p>' +
        '</div>';
      console.error('KPZ Draw load failed:', err);
    }
  </script>
</body>
</html>
